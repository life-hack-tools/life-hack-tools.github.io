<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hỗ trợ - Life Hack Tools</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      overflow-x: hidden;
    }

    /* Navigation */
    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 16px 24px;
      background: rgba(10,10,10,0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .nav a {
      color: #aaa; text-decoration: none; font-size: 14px;
      transition: color 0.3s;
    }
    .nav a:hover { color: #fff; }
    .lang-switch {
      display: flex; gap: 8px;
    }
    .lang-switch a {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.15);
      color: #888;
      text-decoration: none;
      transition: all 0.2s;
    }
    .lang-switch a:hover { color: #fff; border-color: rgba(255,255,255,0.4); }
    .lang-switch a.active {
      color: #fff;
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.3);
    }

    .content {
      max-width: 700px;
      margin: 0 auto;
      padding: 100px 24px 80px;
    }
    h1 {
      font-size: clamp(28px, 5vw, 40px);
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 40px;
    }

    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 20px;
      transition: border-color 0.3s;
    }
    .card:hover {
      border-color: rgba(255,255,255,0.12);
    }
    .card h2 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .card p {
      font-size: 15px;
      color: #999;
      line-height: 1.8;
    }
    .card a {
      color: #dc2626;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }
    .card a:hover { color: #ef4444; }
    .card strong { color: #ccc; }

    .x-contact {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 16px;
    }
    .x-contact .x-icon {
      width: 48px; height: 48px;
      background: #fff;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .x-contact .x-icon svg { width: 24px; height: 24px; }
    .x-contact .info { flex: 1; }
    .x-contact .label { font-size: 13px; color: #666; margin-bottom: 4px; }
    .x-contact a {
      color: #f0f0f0;
      font-weight: 600;
      font-size: 16px;
    }
    .x-contact a:hover { color: #dc2626; }

    /* Animations */
    .fade-in {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .fade-in.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="nav">
    <a href="/vi/">&larr; LHTz</a>
    <div class="lang-switch">
      <a href="/support/">JA</a>
      <a href="/en/support/">EN</a>
      <a href="/vi/support/" class="active">VI</a>
    </div>
  </div>

  <div class="content">
    <h1>Hỗ trợ</h1>

    <div class="card fade-in">
      <h2>Liên hệ</h2>
      <p>Nếu bạn có câu hỏi, báo lỗi hoặc yêu cầu, vui lòng nhắn tin qua X (Twitter) DM.</p>
      <div class="x-contact">
        <div class="x-icon">
          <svg viewBox="0 0 24 24" fill="#000"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        </div>
        <div class="info">
          <div class="label">Liên hệ qua DM</div>
          <a href="https://x.com/LifeHackToolz" target="_blank">@LifeHackToolz</a>
        </div>
      </div>
    </div>

  </div>

  <script>
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('visible');
      });
    }, { threshold: 0.1 });
    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
  </script>
</body>
</html>
