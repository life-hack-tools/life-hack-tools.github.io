<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Life Hack Tools</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      overflow: hidden;
    }

    .ghost {
      font-size: 120px;
      line-height: 1;
      margin-bottom: 16px;
      animation: float 3s ease-in-out infinite;
      cursor: default;
      user-select: none;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(-12px) rotate(-3deg); }
      75% { transform: translateY(-8px) rotate(3deg); }
    }
    .ghost:hover {
      animation: spin 0.6s ease;
    }
    @keyframes spin {
      0% { transform: rotate(0deg) scale(1); }
      50% { transform: rotate(180deg) scale(1.2); }
      100% { transform: rotate(360deg) scale(1); }
    }

    .code {
      font-size: clamp(80px, 20vw, 160px);
      font-weight: 900;
      letter-spacing: -4px;
      background: linear-gradient(135deg, #dc2626, #f59e0b, #8b5cf6, #3b82f6);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradient 4s ease infinite;
      line-height: 1;
    }
    @keyframes gradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .message {
      font-size: 18px;
      color: #666;
      margin: 16px 0 40px;
      line-height: 1.6;
    }

    .home-link {
      display: inline-block;
      color: #f0f0f0;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      padding: 12px 32px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      transition: all 0.3s;
    }
    .home-link:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.3);
      transform: translateY(-2px);
    }

    /* Floating particles */
    .particles {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: -1;
    }
    .particle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.03);
      animation: drift linear infinite;
    }
    @keyframes drift {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>

  <div class="ghost">👻</div>
  <div class="code">404</div>
  <p class="message">このページ、どこかに消えちゃったみたい。</p>
  <a href="/" class="home-link">ホームに戻る</a>

  <script>
    // Generate floating particles
    const container = document.getElementById('particles');
    for (let i = 0; i < 20; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 6 + 2;
      p.style.width = size + 'px';
      p.style.height = size + 'px';
      p.style.left = Math.random() * 100 + '%';
      p.style.animationDuration = (Math.random() * 10 + 8) + 's';
      p.style.animationDelay = (Math.random() * 10) + 's';
      container.appendChild(p);
    }

    // Ghost click easter egg
    let clicks = 0;
    const ghost = document.querySelector('.ghost');
    const faces = ['👻', '💀', '👽', '🤖', '🫠', '🙃', '🫣', '🪿', '🦖', '🛸'];
    ghost.addEventListener('click', () => {
      clicks++;
      ghost.textContent = faces[clicks % faces.length];
    });
  </script>
</body>
</html>
